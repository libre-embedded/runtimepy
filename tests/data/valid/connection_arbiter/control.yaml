---
includes:
  - package://runtimepy/factories.yaml

tasks:
  - {name: clock_task, factory: stepper_toggler}

structs:
  - name: clock
    factory: toggle_stepper
  - name: noise
    factory: gaussian_source
    config: {count: 4}

  - name: manual_channels
    config:
      channels:
        bool: {type: bool}
        int8: {type: int8}
        int16: {type: int16}
        int32: {type: int32}
        int64: {type: int64}
        float: {type: float}
        double: {type: double}
        uint8: {type: uint8}
        uint16: {type: uint16}
        uint32: {type: uint32}
        uint64: {type: uint64}

app:
  - tests.control.test_step.controls_test
